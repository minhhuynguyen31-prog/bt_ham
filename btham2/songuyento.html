     <script>
       let number = parseInt(prompt("Nhập số nguyên tố :"));

let n = 2;     // Số bắt đầu kiểm tra

// Hàm kiểm tra một số có phải số nguyên tố không
function isPrime(num) {
    if (num < 2) return false;
    if (num <= 3) return true;
    if (num % 2 === 0 || num % 3 === 0) return false;

    for (let i = 5; i * i <= num; i += 6) {
        if (num % i === 0 || num % (i + 2) === 0) {
            return false;
        }
    }
    return true;

  
}
let primearray =[];
for (n =2 ; n<10000;n++){
    if(isPrime(n)){
        primearray.push(n);
    }
}

if(primearray.includes(number)){
    alert("la so nguyen to")
}else{
    alert("ko la so nguyen to")
}

    </script>
