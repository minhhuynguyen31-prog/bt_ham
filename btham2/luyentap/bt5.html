<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body onload="search()">
    <script>

        function search() {
            let input = prompt("nhap ngoi sao")
            let star = ["Polaris", "Aldebaran", "Deneb", "Vega", "Altair", "Dubhe", "Regulus"]
            let constellation = ["Ursa Minor", "Taurus", "Cygnus", "Lyra", "Aquila", "Ursa Major", "Leo"]
            let index = -1
            for (let i = 0; i < star.length; i++) {
                if (input.toLowerCase() === star[i].toLowerCase()) {
                    index = i;
                    break;
                }
            }
            if (index !== -1) {
                alert("Ngôi sao " + star[index] + " thuộc chòm sao: " + constellation[index]);
            } else {
                alert("ko tim thay")
            }

        }
    </script>
</body>

</html>
